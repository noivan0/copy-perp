name: Deploy — Backend (Railway) + Frontend (Vercel)

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: false
        default: 'all'
        type: choice
        options: [all, backend, frontend]

jobs:
  # ──────────────────────────────────────────────────────────
  # T1: Railway 백엔드 배포
  # ──────────────────────────────────────────────────────────
  deploy-backend:
    name: 🔧 Railway Backend
    runs-on: ubuntu-latest
    if: github.event.inputs.target != 'frontend'
    outputs:
      backend_url: ${{ steps.get-url.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          cd copy-perp 2>/dev/null || true
          railway up --detach --service copy-perp-api

      - name: Set environment variables
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway vars set \
            NETWORK=testnet \
            BUILDER_CODE=noivan \
            BUILDER_FEE_RATE=0.001 \
            PRIVY_APP_ID=${{ secrets.PRIVY_APP_ID }} \
            ACCOUNT_ADDRESS=${{ secrets.ACCOUNT_ADDRESS }} \
            AGENT_WALLET=${{ secrets.AGENT_WALLET }} \
            AGENT_PRIVATE_KEY=${{ secrets.AGENT_PRIVATE_KEY }} \
            DB_PATH=/tmp/copy_perp.db

      - name: Get Railway URL
        id: get-url
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          URL=$(railway domain 2>/dev/null || echo "pending")
          echo "url=https://$URL" >> $GITHUB_OUTPUT
          echo "Backend URL: https://$URL"

      - name: Health check
        run: |
          URL="${{ steps.get-url.outputs.url }}"
          if [ "$URL" != "https://pending" ]; then
            sleep 30
            curl -f "$URL/health" || echo "헬스체크 실패 (배포 중일 수 있음)"
          fi

  # ──────────────────────────────────────────────────────────
  # T2: Vercel 프론트엔드 배포
  # ──────────────────────────────────────────────────────────
  deploy-frontend:
    name: 🌐 Vercel Frontend
    runs-on: ubuntu-latest
    needs: [deploy-backend]
    if: always() && github.event.inputs.target != 'backend'

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          BACKEND_URL: ${{ needs.deploy-backend.outputs.backend_url || secrets.BACKEND_URL }}
        run: |
          cd copy-perp-web
          vercel deploy --prod \
            --token "$VERCEL_TOKEN" \
            --yes \
            --env NEXT_PUBLIC_PRIVY_APP_ID=cmmvoxcix058e0ckv7uhp9ip0 \
            --env NEXT_PUBLIC_API_URL="${BACKEND_URL:-https://copy-perp-production.up.railway.app}" \
            --env NEXT_PUBLIC_BUILDER_CODE=noivan \
            2>&1 | tee /tmp/vercel-output.txt

          FRONTEND_URL=$(grep "https://" /tmp/vercel-output.txt | tail -1)
          echo "Frontend URL: $FRONTEND_URL"
          echo "FRONTEND_URL=$FRONTEND_URL" >> $GITHUB_ENV

      - name: Summary
        run: |
          echo "## 🏁 배포 완료" >> $GITHUB_STEP_SUMMARY
          echo "| 항목 | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.deploy-backend.outputs.backend_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | $FRONTEND_URL |" >> $GITHUB_STEP_SUMMARY
