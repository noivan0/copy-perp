services:
  - type: web
    name: copy-perp
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: NETWORK
        value: testnet
      - key: BUILDER_CODE
        value: noivan
      - key: BUILDER_FEE_RATE
        value: "0.001"
      - key: PRIVY_APP_ID
        value: cmmvoxcix058e0ckv7uhp9ip0
      - key: ACCOUNT_ADDRESS
        value: 3AHZqrocSguMuo9sUUP8G8YN8NwHwWV2DPUQvbDvtfaQ
      - key: AGENT_WALLET
        sync: false   # Render Dashboard에서 입력
      - key: AGENT_PRIVATE_KEY
        sync: false   # Render Dashboard에서 입력
      - key: ALLOWED_ORIGINS
        value: "https://copy-perp.vercel.app,http://localhost:3000"
      - key: DB_PATH
        value: /tmp/copy_perp.db
      - key: PORT
        value: "8001"
