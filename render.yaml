services:
  - type: web
    name: copy-perp
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NETWORK
        value: testnet
      - key: BUILDER_CODE
        value: noivan
      - key: BUILDER_FEE_RATE
        value: "0.001"
      - key: PRIVY_APP_ID
        value: cmmvoxcix058e0ckv7uhp9ip0
      - key: ACCOUNT_ADDRESS
        value: 3AHZqrocSguMuo9sUUP8G8YN8NwHwWV2DPUQvbDvtfaQ
      - key: AGENT_WALLET
        sync: false
      - key: AGENT_PRIVATE_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://copy-perp.onrender.com,https://copy-perp-frontend.vercel.app,https://copy-perp-web.vercel.app,http://localhost:3000"
      - key: DB_PATH
        value: ./copy_perp.db
