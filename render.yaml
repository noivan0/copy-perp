services:
  - type: web
    name: copy-perp
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    # SQLite는 단일 프로세스만 안전 — workers=2는 database is locked 유발
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /healthz
    # disk 섹션 제거 — Turso 클라우드 DB 사용으로 영속 Disk 불필요
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: NETWORK
        value: mainnet
      - key: BUILDER_CODE
        value: noivan
      - key: BUILDER_FEE_RATE
        value: "0.001"
      - key: APP_BASE_URL
        value: "https://copy-perp-frontend.vercel.app"
      - key: PRIVY_APP_ID
        value: cmmvoxcix058e0ckv7uhp9ip0
      - key: ACCOUNT_ADDRESS
        value: 3AHZqrocSguMuo9sUUP8G8YN8NwHwWV2DPUQvbDvtfaQ
      - key: AGENT_WALLET
        sync: false
      - key: AGENT_PRIVATE_KEY
        sync: false
      - key: PACIFICA_REST_URL
        value: "https://api.pacifica.fi/api/v1"
      - key: PACIFICA_WS_URL
        value: "wss://ws.pacifica.fi/ws"
      - key: ALLOWED_ORIGINS
        value: "https://copy-perp-frontend.vercel.app,https://copy-perp.onrender.com,http://localhost:3000"
      - key: DEBUG
        value: "false"
      # Render 리버스 프록시 IP 신뢰 (rate limit IP 정확도 향상)
      - key: TRUSTED_PROXY_IPS
        value: "10.0.0.0/8"
      # testnet 직접 접근 (IP whitelist 등록 후)
      - key: PACIFICA_DIRECT
        value: "true"
      # ── Turso 클라우드 DB (영속 스토리지) ──
      - key: TURSO_URL
        value: "https://copy-perp-nothink.aws-ap-northeast-1.turso.io"
      - key: TURSO_TOKEN
        sync: false
