services:
  - type: web
    name: copy-perp
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    # SQLite는 단일 프로세스만 안전 — workers=2는 database is locked 유발
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /healthz
    disk:
      name: copy-perp-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NETWORK
        value: testnet
      - key: BUILDER_CODE
        value: noivan
      - key: BUILDER_FEE_RATE
        value: "0.001"
      - key: PRIVY_APP_ID
        value: cmmvoxcix058e0ckv7uhp9ip0
      - key: ACCOUNT_ADDRESS
        value: 3AHZqrocSguMuo9sUUP8G8YN8NwHwWV2DPUQvbDvtfaQ
      - key: AGENT_WALLET
        sync: false
      - key: AGENT_PRIVATE_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://copy-perp-frontend.vercel.app,https://copy-perp.onrender.com,http://localhost:3000"
      # 영속 디스크 경로 (재배포 후에도 데이터 유지)
      - key: DB_PATH
        value: /var/data/copy_perp.db
      - key: DEBUG
        value: "false"
      # Render 리버스 프록시 IP 신뢰 (rate limit IP 정확도 향상)
      - key: TRUSTED_PROXY_IPS
        value: "10.0.0.0/8"
